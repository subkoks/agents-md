repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^dist/'
      - id: end-of-file-fixer
        exclude: '^dist/'
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-shebang-scripts-are-executable
      - id: check-executables-have-shebangs
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: ['-e', 'SC1091', '-e', 'SC2155']

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.18.1
    hooks:
      - id: markdownlint-cli2
        exclude: '^(dist/|CHANGELOG\.md$)'

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: validate-rules
        name: Validate Rules
        entry: ./scripts/validate-rules.sh
        language: script
        pass_filenames: false
        always_run: true

      - id: enforce-canonical-rules
        name: Enforce Canonical Rules
        entry: ./scripts/enforce-canonical-rules.sh
        language: script
        pass_filenames: false
        always_run: true

      - id: validate-comprehensive
        name: Comprehensive Validation
        entry: ./scripts/validate-comprehensive.sh
        args: [--strict]
        language: script
        pass_filenames: false
        always_run: true

      - id: check-rule-drift
        name: Check Local Drift
        entry: ./scripts/check-local-drift.sh
        language: script
        pass_filenames: false
        always_run: true

      - id: check-skill-registry-drift
        name: Check Skill Registry Drift
        entry: ./scripts/check-skill-registry-drift.sh
        language: script
        pass_filenames: false
        always_run: true

      - id: check-links
        name: Check Markdown Links
        entry: ./scripts/check-links.sh
        language: script
        pass_filenames: false
        always_run: true

      - id: build-rule-artifacts-on-change
        name: Build Rule Artifacts on Change
        entry: ./scripts/build-rule-artifacts.sh
        args: [--dry-run]
        language: script
        pass_filenames: false
        always_run: true
        files: src/gotcha\.md

name: ci

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        env:
          SHELLCHECK_OPTS: -e SC1091 -e SC2155

      - name: actionlint
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: "**/*.md"

  validate:
    name: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Validate rules structure
        run: ./scripts/validate-rules.sh

      - name: Comprehensive validation
        run: ./scripts/validate-comprehensive.sh --strict

      - name: Check markdown links
        run: ./scripts/check-links.sh

      - name: Check rule drift (pre-build)
        run: ./scripts/check-local-drift.sh

      - name: Check skill registry drift
        run: ./scripts/check-skill-registry-drift.sh

  build:
    name: build
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Build artifacts (dry run)
        run: ./scripts/build-rule-artifacts.sh --dry-run --verbose

      - name: Build artifacts
        run: ./scripts/build-rule-artifacts.sh --force --verbose

      - name: Strict drift check
        run: ./scripts/check-local-drift.sh --strict

      - name: Verify all artifacts exist
        run: |
          test -f dist/rules/windsurf.md
          test -f dist/rules/claude.md
          test -f dist/rules/codex.md

  security-scan:
    name: security-scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@17456f8c7d042d8c82c9a8ca9e937231f9f42e26 # v3.95.2
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --results=verified,unknown

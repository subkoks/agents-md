name: Validate Rules

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: validate-rules-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: |
          chmod +x scripts/*.sh

      - name: Validate rules structure
        run: |
          ./scripts/validate-rules.sh --verbose

      - name: Comprehensive validation
        run: |
          ./scripts/validate-comprehensive.sh --verbose

      - name: Check rule drift
        run: |
          ./scripts/check-local-drift.sh --verbose

      - name: Check markdown links
        run: |
          ./scripts/check-links.sh --verbose

      - name: Test artifact build script (dry run)
        run: |
          ./scripts/build-rule-artifacts.sh --dry-run --verbose

      - name: Build artifacts
        run: |
          ./scripts/build-rule-artifacts.sh --verbose

      - name: Verify strict local drift
        run: |
          ./scripts/check-local-drift.sh --strict

  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}

  compatibility-test:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build all artifacts
        run: |
          ./scripts/build-rule-artifacts.sh all

      - name: Validate artifact files exist
        run: |
          test -f dist/rules/windsurf.md
          test -f dist/rules/claude.md
          test -f dist/rules/codex.md

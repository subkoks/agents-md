name: auto-merge

# Enables GitHub auto-merge on same-repo PRs so they merge automatically once all
# required status checks pass (branch protection still gates — nothing merges on red).
# Safe by design: this workflow never checks out PR code (it only calls the API), and
# it skips PRs from external forks, so untrusted code never runs with the write token.

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Gate on same-repo branch AND trusted author association so auto-merge is
    # only enabled for owner/member/collaborator PRs — external forks and
    # untrusted contributors (incl. bot/Dependabot PRs) are skipped, matching
    # the author-association allowlist used in claude.yml.
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
    steps:
      - name: Enable auto-merge
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}

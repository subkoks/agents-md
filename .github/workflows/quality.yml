name: quality

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run rule validation
        run: ./scripts/validate-rules.sh

      - name: Run markdown link check
        run: ./scripts/check-links.sh

      - name: Run drift check
        run: ./scripts/check-local-drift.sh

      - name: Build local artifacts (dry run)
        run: ./scripts/build-rule-artifacts.sh --dry-run
